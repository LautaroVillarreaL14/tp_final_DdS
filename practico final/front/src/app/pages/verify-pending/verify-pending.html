<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h3>Revisá tu email. Te enviamos un link de verificación.</h3>

        

        <button class="btn btn-primary w-100 mt-4" (click)="resend()" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-1" role="status"></span>
          }
          Reenviar email
        </button>

        <p class="mt-4 text-muted">Si no recibís el email, revisá la carpeta de spam.</p>
        <p class="text-muted">Volver a <a routerLink="/login">iniciar sesión</a>.</p>
      </div>
    </div>
  </div>
</div>
