<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h3>{{ status() }}</h3>
        @if (status() === 'Email verificado correctamente') {
          <p class="text-muted mt-3">
            Ya podés <a routerLink="/login">iniciar sesión</a>.
          </p>
        }
        @if (status() === 'Token inválido o expirado') {
          <p class="text-muted mt-3">
            Si tenés cuenta, inicia sesión para reenviar el email desde tu perfil.
          </p>
        }
      </div>
    </div>
  </div>
</div>
